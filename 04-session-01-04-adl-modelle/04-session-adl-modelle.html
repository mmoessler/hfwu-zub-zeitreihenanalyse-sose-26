<!DOCTYPE html>
<html lang="de">
<head>
  <title>HfWU - ZUB - Zeitreihenanalyse</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../assets/logos/favicon.ico">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
  <link rel="stylesheet" href="../assets/mystyle.css">
  <link rel="stylesheet" href="../assets/code-style.css">
</head>
<body>

  <div style="text-align:center;" background-color="#eeeeee;">
    <img src="../assets/logos/hfwu_logo.svg" height="200px"/>
  </div>

  <button id="dark-mode-toggle" class="btn btn-outline-secondary"
          style="position:fixed; top:50px; right:20px; z-index:1000;">
    🌙 Dark Mode
  </button>

  <button id="back-to-additional-material" class="btn btn-outline-secondary"
          style="position:fixed; top:100px; right:20px; z-index:1000;"
          onclick="window.location.href='../index.html?page=index';">
    ⬅⬅ Zurück zum Start
  </button>

  <button id="back-to-additional-material" class="btn btn-outline-secondary"
          style="position:fixed; top:150px; right:20px; z-index:1000;"
          onclick="window.location.href='./04-session-adl-modelle.html?page=index';">
    ⬅ Zurück zur Session
  </button>

  <button id="back-to-outline" class="btn btn-outline-secondary"
          style="position:fixed; top:200px; right:20px; z-index:1000;">
    ⬆ Zurück zum Anfang
  </button>

  <div class="container" style="margin-bottom:30px;">
    <div id="markdown-content">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-r.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-anchor@8.6.7/dist/markdownItAnchor.umd.js"></script>

  <script>
    const toggleButton = document.getElementById('dark-mode-toggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark-mode');
      toggleButton.textContent = '☀ Light Mode';
    }

    toggleButton.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      const isDark = body.classList.contains('dark-mode');
      toggleButton.textContent = isDark ? '☀ Light Mode' : '🌙 Dark Mode';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    const backButton = document.getElementById('back-to-outline');
    if (backButton) {
      backButton.addEventListener('click', () => {
        const outline = document.querySelector('#learning-goals-and-outline');
        if (outline) {
          outline.scrollIntoView({ behavior: 'smooth' });
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }
  </script>

  <script src="../assets/code-script.js"></script>
  <script src="../assets/markdown-renderer.js"></script>
</body>
</html>
